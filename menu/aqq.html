    :root {
      --green: #2d5a27;
      --green-light: #3a7332;
      --green-dark: #1e3d1a;
      --gold: #c9a84c;
      --gold-light: #d4bc6e;
      --black: #1a1a1a;
      --white: #ffffff;
      --gray-50: #fafafa;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-400: #9ca3af;
      --gray-600: #6b7280;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(45,90,39,0.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
      --radius: 16px;
      --radius-sm: 12px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --header-h: 72px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--white);
      color: var(--black);
      line-height: 1.5;
      overflow-x: hidden;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
      padding: 12px 16px 10px;
    }
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      animation: logoDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0; transform: translateY(-80px);
    }
    @keyframes logoDrop {
      0%   { opacity:0; transform:translateY(-80px); }
      60%  { opacity:1; transform:translateY(8px); }
      80%  { transform:translateY(-4px); }
      100% { opacity:1; transform:translateY(0); }
    }

    /* ─────────────────────────────────────────
       ЛОГОТИП СУРЕТІ
       src="aqvilla_logo.png" — осы жерге өз
       логотип файлыңның атын жаз.
       Файл index.html-мен БІР ҚАЛТАДА болсын.
       Ұсынылған өлшем: 120x120px, PNG (фонсыз)
    ───────────────────────────────────────── */
    .logo-img-wrap {
      width: 56px; height: 56px; border-radius: 50%;
      overflow: hidden; border: 2.5px solid var(--gold-light);
      box-shadow: var(--shadow-sm); background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-img-wrap img { width:100%; height:100%; object-fit:cover; }

    .logo-text { font-size:1.35rem; font-weight:800; letter-spacing:0.18em; color:var(--green); }
    .logo-sub  { font-size:0.65rem; font-weight:500; letter-spacing:0.12em; color:var(--gray-600); text-transform:uppercase; }

    /* LANG */
    .lang-bar { display:flex; justify-content:center; gap:8px; margin-top:10px; }
    .lang-btn {
      min-width:44px; min-height:44px; padding:8px 16px;
      border:2px solid var(--gray-200); background:var(--white);
      border-radius:999px; font-family:inherit; font-size:0.75rem;
      font-weight:700; letter-spacing:0.05em; color:var(--gray-600); cursor:pointer;
      transition:var(--transition);
    }
    .lang-btn.active { background:var(--green); border-color:var(--green); color:var(--white); }
    .lang-btn:not(.active):hover { border-color:var(--gold); color:var(--green); }

    /* TABS */
    .tabs-wrap {
      position:sticky; top:var(--header-h); z-index:90;
      background:var(--white); border-bottom:1px solid var(--gray-200); padding:8px 0;
    }
    .tabs-scroll {
      display:flex; gap:8px; overflow-x:auto;
      scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
      scrollbar-width:none; padding:4px 16px;
    }
    .tabs-scroll::-webkit-scrollbar { display:none; }
    .tab-btn {
      flex-shrink:0; scroll-snap-align:start;
      display:flex; flex-direction:column; align-items:center; gap:4px;
      min-width:80px; min-height:52px; padding:8px 10px;
      border:none; background:var(--gray-100); border-radius:var(--radius-sm);
      cursor:pointer; transition:var(--transition); font-family:inherit;
    }
    .tab-btn .tab-icon  { font-size:1.25rem; line-height:1; }
    .tab-btn .tab-label {
      font-size:0.55rem; font-weight:600; color:var(--gray-600);
      text-align:center; line-height:1.2; max-width:80px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .tab-btn.active { background:var(--green); box-shadow:var(--shadow-md); transform:scale(1.02); }
    .tab-btn.active .tab-label { color:var(--white); }

    /* MENU PANEL */
    .menu-panel { padding:16px 16px 100px; animation:panelIn 0.4s ease forwards; }
    @keyframes panelIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .menu-panel.switching { animation:panelOut 0.2s ease forwards; }
    @keyframes panelOut { to{opacity:0;transform:translateY(-8px)} }

    .category-title {
      font-size:1.1rem; font-weight:700; color:var(--green);
      margin-bottom:16px; padding-bottom:8px; border-bottom:2px solid var(--gold);
      display:flex; align-items:center; gap:8px;
    }
    .menu-list { display:flex; flex-direction:column; gap:14px; }

    /* CARD */
    .menu-card {
      display:flex; gap:14px; padding:14px;
      background:var(--white); border:1px solid var(--gray-200);
      border-radius:var(--radius); box-shadow:var(--shadow-sm);
      opacity:0; transform:translateY(24px);
      transition:opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s ease;
    }
    .menu-card.visible { opacity:1; transform:translateY(0); }
    .menu-card:active  { box-shadow:var(--shadow-md); }

    /* ─────────────────────────────────────────
       ТАҒАМ СУРЕТТЕРІ
       Әрбір тағамда img: "photo_XXX.jpg" бар
       Сол файл атын өз суретіңнің атына өзгерт.
       Барлық фото БІР ҚАЛТАДА (index.html жанында).
       Ұсынылған өлшем: 160×160px, квадрат crop
    ───────────────────────────────────────── */
    .card-image-wrap { flex-shrink:0; width:80px; height:80px; }
    .card-image {
      width:80px; height:80px; border-radius:50%; object-fit:cover;
      border:3px solid var(--gold-light); box-shadow:var(--shadow-sm);
      animation:floatWave 4s ease-in-out infinite; background:var(--gray-100);
    }
    .menu-card:nth-child(even) .card-image { animation-delay:-2s; }
    .menu-card:nth-child(3n)   .card-image { animation-delay:-1s; }
    .menu-card:nth-child(4n)   .card-image { animation-delay:-3s; }
    @keyframes floatWave { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .card-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
    .card-top  { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .card-name  { font-size:0.875rem; font-weight:700; color:var(--black); line-height:1.3; }
    .card-price { flex-shrink:0; font-size:0.8rem; font-weight:700; color:var(--green); white-space:nowrap; }
    .card-desc  { font-size:0.72rem; color:var(--gray-600); line-height:1.45; }

    .hit-badge {
      display:inline-flex; align-items:center; gap:2px; margin-top:4px;
      padding:3px 8px; background:linear-gradient(135deg,#ff6b35,#ff8c42);
      color:var(--white); font-size:0.6rem; font-weight:800;
      letter-spacing:0.08em; border-radius:999px; width:fit-content;
    }
    .section-note {
      font-size:0.75rem; font-weight:600; color:var(--gold);
      margin:12px 0 8px; text-transform:uppercase; letter-spacing:0.06em;

    /* INSTAGRAM FAB */
    .instagram-fab {
      position:fixed; bottom:24px;

      z-index:200; width:52px; height:52px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      box-shadow:0 4px 20px rgba(220,39,67,0.4);
      text-decoration:none; animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{transform:scale(1); box-shadow:0 4px 20px rgba(220,39,67,0.4);}

    }
    .instagram-fab i {
  font-size:28px;
  color:white;
}

    /* FOOTER */
    .footer {
      text-align:center; padding:24px 16px 32px;
      background:var(--gray-50); border-top:1px solid var(--gray-200);
    }
    .footer-service { font-size:0.72rem; color:var(--gray-600); margin-bottom:8px; }
    .footer-brand   { font-size:0.8rem; font-weight:700; color:var(--green); letter-spacing:0.1em; }
    .footer-contact{
  margin: 8px 0;
  font-size: 14px;
  font-weight: 600;
  color: #2d5a27;
}
  </style>
</head>

// ─── LOGIC ───────────────────────────────────────
let currentLang = 'ru';
let currentCategory = 'first';
let observer = null;

function formatPrice(item, lang) {
  if (item.priceLabel === 'byWeight') return UI.byWeight[lang];
  if (!item.price) return '';
  const unit = UI.tg[lang];
  const suffix = item.per100 ? UI.per100g[lang] : '';
  return `${Number(item.price).toLocaleString('ru-RU')} ${unit}${suffix}`;
}

function renderTabs() {
  const scroll = document.getElementById('tabsScroll');
  scroll.innerHTML = CATEGORIES.map(cat => `
    <button class="tab-btn${cat.id === currentCategory ? ' active' : ''}" type="button" role="tab" data-cat="${cat.id}" aria-selected="${cat.id === currentCategory}">
      <span class="tab-icon">${cat.icon}</span>
      <span class="tab-label">${cat.name[currentLang]}</span>
    </button>
  `).join('');
  scroll.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchCategory(btn.dataset.cat, btn));
  });
  const active = scroll.querySelector('.tab-btn.active');
  if (active) active.scrollIntoView({ inline:'center', behavior:'smooth' });
}

function renderCard(item, lang) {
  if (item.section) return `<p class="section-note">${UI[item.section]?.[lang] || ''}</p>`;
  const hitBadge = item.hit ? `<span class="hit-badge">🔥 ${UI.hit[lang]}</span>` : '';
  const priceStr = formatPrice(item, lang);
  return `
    <article class="menu-card" data-observe>
      <div class="card-image-wrap">
        <img class="card-image" src="${item.img}" alt="${item.name[lang]}" loading="lazy" width="80" height="80"
          onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\'width:80px;height:80px;border-radius:50%;background:#eef4ee;border:3px solid #d4bc6e;display:flex;align-items:center;justify-content:center;font-size:2rem;animation:floatWave 4s ease-in-out infinite\'>🍽️</div>'">
      </div>
      <div class="card-body">
        <div class="card-top">
          <h3 class="card-name">${item.name[lang]}</h3>
          ${priceStr ? `<span class="card-price">${priceStr}</span>` : ''}
        </div>
        <p class="card-desc">${item.desc[lang]}</p>
        ${hitBadge}
      </div>
    </article>`;
}

function renderMenu(animate) {
  const container = document.getElementById('menuContainer');
  const cat = CATEGORIES.find(c => c.id === currentCategory);
  const items = MENU[currentCategory] || [];
  const html = `
    <div class="menu-panel" id="menuPanel">
      <h2 class="category-title"><span>${cat.icon}</span><span>${cat.name[currentLang]}</span></h2>
      <div class="menu-list">${items.map(i => renderCard(i, currentLang)).join('')}</div>
    </div>`;
  if (animate && container.firstElementChild) {
    container.firstElementChild.classList.add('switching');
    setTimeout(() => { container.innerHTML = html; initObserver(); }, 200);
  } else {
    container.innerHTML = html;
    initObserver();
  }
}

function switchCategory(catId, btn) {
  if (catId === currentCategory) return;
  currentCategory = catId;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === catId);
    b.setAttribute('aria-selected', b.dataset.cat === catId);
  });
  if (btn) btn.scrollIntoView({ inline:'center', behavior:'smooth' });
  renderMenu(true);
}

function setLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (UI[key]) el.textContent = UI[key][lang];
  });
  renderTabs();
  renderMenu(false);
}

function initObserver() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
    });
  }, { threshold:0.12, rootMargin:'0px 0px -40px 0px' });
  document.querySelectorAll('.menu-card[data-observe]').forEach(card => observer.observe(card));
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
});

renderTabs();
renderMenu(false);

const header = document.getElementById('header');
const resizeHeader = () => document.documentElement.style.setProperty('--header-h', header.offsetHeight + 'px');
resizeHeader();
window.addEventListener('resize', resizeHeader);
</script>
